services:
  - type: web
    name: edubridge
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn EduBridge.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "edubridge.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://edubridge.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: edubridge-db
          property: connectionString

databases:
  - name: edubridge-db
    plan: free
    region: frankfurt